<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan BI — Arsip Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[#0f172a] min-h-screen text-gray-200">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar (Placeholder, will be updated by fix_html.js) -->
    <aside id="sidebar"
        class="sidebar fixed top-0 left-0 h-full w-64 bg-[#0c1222] border-r border-white/5 flex flex-col z-40">
        <!-- Content injected by fix_html.js -->
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="ml-64 min-h-screen transition-all duration-300">
        <header class="sticky top-0 z-30 backdrop-blur-xl bg-[#0f172a]/80 border-b border-white/5 px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-400 hover:bg-white/5">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <div>
                        <h2 class="text-lg font-semibold text-white">Laporan Business Intelligence</h2>
                        <p class="text-xs text-gray-500">Wawasan Finansial & Sinkronisasi Penyimpanan</p>
                    </div>
                </div>
                <button onclick="triggerSync()" id="sync-btn"
                    class="btn-ghost flex items-center gap-2 px-4 py-2 rounded-xl text-sm text-indigo-400 hover:bg-indigo-500/10">
                    <svg id="sync-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Sync Terabox
                </button>
            </div>
        </header>

        <div class="p-6 space-y-6">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-card p-6 rounded-2xl border-l-4 border-indigo-500">
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-bold">Total Nilai Invoice</p>
                    <h3 id="stat-total-inv" class="text-2xl font-bold text-white mt-2">Rp 0</h3>
                    <p id="count-inv" class="text-[10px] text-gray-600 mt-1">0 Dokumen</p>
                </div>
                <div class="glass-card p-6 rounded-2xl border-l-4 border-emerald-500">
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-bold">Total Nilai Piutang</p>
                    <h3 id="stat-total-piu" class="text-2xl font-bold text-white mt-2">Rp 0</h3>
                    <p id="count-piu" class="text-[10px] text-gray-600 mt-1">0 Dokumen</p>
                </div>
                <div class="glass-card p-6 rounded-2xl border-l-4 border-cyan-500">
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-bold">Volume Total Bisnis</p>
                    <h3 id="stat-total-all" class="text-2xl font-bold text-white mt-2">Rp 0</h3>
                    <p class="text-[10px] text-gray-600 mt-1">Semua Kategori Aktif</p>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Bar Chart -->
                <div class="glass-card p-6 rounded-2xl">
                    <h3 class="text-sm font-semibold text-white mb-6 flex items-center gap-2">
                        <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        Distribusi Nilai per Zona
                    </h3>
                    <div style="height: 300px;">
                        <canvas id="zonaChart"></canvas>
                    </div>
                </div>

                <!-- Doughnut Chart -->
                <div class="glass-card p-6 rounded-2xl">
                    <h3 class="text-sm font-semibold text-white mb-6 flex items-center gap-2">
                        <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        Komposisi Jenis Dokumen
                    </h3>
                    <div style="height: 300px;" class="flex justify-center">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let zonaChart, categoryChart;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await initAuth();
            if (!user) return;
            loadBIStats();
        });

        async function loadBIStats() {
            try {
                const stats = await API.get('/api/reports/stats');

                // Update Cards
                document.getElementById('stat-total-inv').textContent = formatCurrency(stats.total_invoice);
                document.getElementById('stat-total-piu').textContent = formatCurrency(stats.total_piutang);
                document.getElementById('stat-total-all').textContent = formatCurrency(stats.total_amount);
                document.getElementById('count-inv').textContent = `${stats.category_counts.INVOICE} Dokumen`;
                document.getElementById('count-piu').textContent = `${stats.category_counts.PIUTANG} Dokumen`;

                renderCharts(stats);
            } catch (err) {
                Toast.error('Gagal memuat data laporan.');
            }
        }

        function renderCharts(stats) {
            // Zona Chart
            const zonaCtx = document.getElementById('zonaChart').getContext('2d');
            const zonaLabels = Object.keys(stats.zona_dist);
            const zonaData = Object.values(stats.zona_dist);

            if (zonaChart) zonaChart.destroy();
            zonaChart = new Chart(zonaCtx, {
                type: 'bar',
                data: {
                    labels: zonaLabels,
                    datasets: [{
                        label: 'Nilai Transaksi (IDR)',
                        data: zonaData,
                        backgroundColor: 'rgba(99, 102, 241, 0.5)',
                        borderColor: '#6366f1',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { font: { size: 10 }, color: '#64748b' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 10 }, color: '#64748b' }
                        }
                    }
                }
            });

            // Category Chart
            const catCtx = document.getElementById('categoryChart').getContext('2d');
            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(catCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Invoice Merah', 'Piutang'],
                    datasets: [{
                        data: [stats.category_counts.INVOICE, stats.category_counts.PIUTANG],
                        backgroundColor: ['#6366f1', '#10b981'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', font: { size: 11 }, padding: 20 }
                        }
                    },
                    cutout: '70%'
                }
            });
        }

        async function triggerSync() {
            const btn = document.getElementById('sync-btn');
            const icon = document.getElementById('sync-icon');

            btn.disabled = true;
            icon.classList.add('animate-spin');
            Toast.info('Sedang menyinkronkan dengan Terabox...');

            try {
                const res = await API.get('/api/sync/storage');
                Toast.success(`Sinkronisasi Selesai! ${res.missing_synced} file tidak ditemukan dan telah dihapus dari sistem.`);
                loadBIStats(); // Refresh charts
            } catch (err) {
                Toast.error('Gagal melakukan sinkronisasi.');
            } finally {
                btn.disabled = false;
                icon.classList.remove('animate-spin');
            }
        }

        function formatCurrency(v) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v);
        }
    </script>
</body>

</html>
